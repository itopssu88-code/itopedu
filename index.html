<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이탑에듀 메인</title>
    <!-- Tailwind CSS 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 한글 폰트(Noto Sans KR) 적용을 위해 추가 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col m-0">
    
    <!-- 상단 메뉴 영역 (추후 버튼을 계속 추가할 수 있습니다) -->
    <header class="w-full p-5 flex justify-end bg-white shadow-sm border-b border-gray-100">
        <a href="https://itopssu88-code.github.io/itopedu/loginstatus" 
           class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-6 rounded-full shadow-md transition duration-300 ease-in-out transform hover:-translate-y-0.5 flex items-center gap-2">
            <span>구독페이지 사용현황</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
        </a>
    </header>

    <!-- 메인 중앙 로고 (이전 버전의 한글 로고로 복구하여 더 통일감 있게 배치했습니다) -->
    <main class="flex-grow flex flex-col items-center justify-center">
        <div class="text-center transform hover:scale-105 transition-transform duration-300">
            <h1 class="text-7xl md:text-9xl font-black text-gray-800 tracking-tighter">
                아이탑<span class="text-indigo-600">에듀</span>
            </h1>
            <p class="mt-6 text-xl md:text-2xl text-gray-500 font-bold">
                내일을 향한 도약
            </p>
        </div>
    </main>

</body>
</html>
